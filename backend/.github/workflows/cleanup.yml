name: Run Database Cleanup
on: [workflow_dispatch] # This allows you to run it manually from the GitHub UI

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install motor
      - name: Run cleanup script
        run: python backend/scripts/purge_test_data.py
        env:
          # If your app needs environment variables (like a DB URI), 
          # add them here
          MONGO_URI: ${{ secrets.MONGO_URI }}
